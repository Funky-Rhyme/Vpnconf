name: Release

# Triggered by pushing a SemVer tag: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  guard-tag-order:
    # Refuses to release an out-of-order tag (e.g. pushing v0.1.0 after v0.3.0 already shipped) —
    # git has no notion of tag ordering, so nothing else stops that by accident.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full tag history to compare against, not just the pushed ref

      - name: Verify this tag is the newest vN.N.N tag
        shell: bash
        run: |
          current="${GITHUB_REF_NAME}"
          latest=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ "$current" != "$latest" ]; then
            echo "::error::Tag '$current' is not the latest release tag — '$latest' is newer or equal. Refusing to publish an out-of-order release. Delete this tag (git push --delete origin $current) if it was pushed by mistake."
            exit 1
          fi
          echo "OK: '$current' is the latest vN.N.N tag."

  publish:
    needs: guard-tag-order
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            binary: vpnconf.exe
          - rid: linux-x64
            os: ubuntu-latest
            binary: vpnconf
          - rid: osx-arm64
            os: macos-latest # Apple Silicon runner
            binary: vpnconf
          # osx-x64 (macos-13) dropped for now — GitHub's Intel-macOS runner pool is scarce enough
          # that this leg was sitting queued for 20+ minutes while the other three finished in
          # under 2. Re-add if/when there's real demand for an Intel Mac binary.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish native AOT binary
        run: >
          dotnet publish NetworkRoutesConflictResolver/NetworkRoutesConflictResolver.csproj
          -r ${{ matrix.rid }} -c Release
          -p:Version=${{ steps.version.outputs.value }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "NetworkRoutesConflictResolver/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary }}" \
             "dist/vpnconf-${{ steps.version.outputs.value }}-${{ matrix.rid }}${{ matrix.rid == 'win-x64' && '.exe' || '' }}"

      - uses: actions/upload-artifact@v5
        with:
          name: vpnconf-${{ matrix.rid }}
          path: dist/*

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --draft --generate-notes --title "${{ github.ref_name }}"
